name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry==1.8.5
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Ruff lint
        run: poetry run ruff check src/ tests/
      - name: Ruff format check
        run: poetry run ruff format --check src/ tests/
      - name: Import architecture contracts
        run: poetry run lint-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install poetry==1.8.5
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Run tests
        run: poetry run pytest tests/ -q --tb=short -x
      - name: Test summary
        if: always()
        run: poetry run pytest tests/ --tb=no -q || true

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t bitbat:ci .
      - name: Verify image runs
        run: |
          BITBAT_V2_OPERATOR_TOKEN=ci-operator-token
          docker run --rm -d \
            --name bitbat-ci \
            -p 8100:8100 \
            -e BITBAT_V2_OPERATOR_TOKEN="$BITBAT_V2_OPERATOR_TOKEN" \
            bitbat:ci
          for i in $(seq 1 15); do
            curl -sf \
              -H "X-BitBat-Operator-Token: $BITBAT_V2_OPERATOR_TOKEN" \
              http://localhost:8100/v1/health && break
            echo "Waiting for server... ($i)"
            sleep 2
          done
          curl -sf \
            -H "X-BitBat-Operator-Token: $BITBAT_V2_OPERATOR_TOKEN" \
            http://localhost:8100/v1/health || exit 1
          docker stop bitbat-ci
