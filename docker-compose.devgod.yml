services:
  devgod-postgres:
    image: pgvector/pgvector:0.8.2-pg18
    container_name: ${DEVGOD_DOCKER_CONTAINER_NAME:-devgod-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DEVGOD_POSTGRES_DB:-devgod}
      POSTGRES_USER: ${DEVGOD_POSTGRES_USER:-devgod}
      POSTGRES_PASSWORD: ${DEVGOD_POSTGRES_PASSWORD:-devgod}
    ports:
      - "${DEVGOD_POSTGRES_PORT:-5432}:5432"
    volumes:
      - devgod-postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DEVGOD_POSTGRES_USER:-devgod} -d ${DEVGOD_POSTGRES_DB:-devgod}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  devgod-postgres-data:
