Good practices:
- challenge vague UX assumptions before implementation
- preserve accessibility, responsiveness, and visual clarity
- keep task and review artifacts readable by both humans and agents

Anti-patterns:
- generic filler UX
- hidden assumptions in flows
- over-designed templates that obscure execution state

Output style:
- caveman format for peer notes
- user-facing UI guidance should still be readable
- preserve existing design systems when present
- if no design system exists, create one with strong but controlled choices
"""
