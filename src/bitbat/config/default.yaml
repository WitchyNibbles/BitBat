data_dir: "data"
freq: "5m"
horizon: "30m"
enter_threshold: 0.6
allow_short: false
cost_bps: 4
fee_bps: 4
slippage_bps: 0
price_source: "yfinance"
news_source: "cryptocompare"
enable_sentiment: true
enable_garch: false
enable_macro: false
enable_onchain: false
fred_api_key: ""
news_throttle_seconds: 10.0
news_retry_limit: 30
seed: 42
feature_lookback: "24h"

# Baseline model controls
model:
  baseline_family: "xgb"
  cv:
    train_window: ""
    backtest_window: ""
    window_step: ""
    embargo_bars: 1
    purge_bars: 0
    label_horizon: ""
  optimization:
    trials: 20
    timeout_seconds: 0
    min_deflated_sharpe: 0.0
    max_overfit_probability: 0.5
    train_window: ""
    backtest_window: ""
    window_step: ""
    embargo_bars: 1
    purge_bars: 0
    label_horizon: ""
  promotion_gate:
    min_consecutive_outperformance: 2
    max_drawdown_floor: -0.35

# Continuous training configuration
continuous_training:
  enabled: true
  retrain_interval_seconds: 1800
  min_new_samples: 6
  rolling_window_bars: 17280
  train_window_bars: 13824
  backtest_window_bars: 3456

# Autonomous System Configuration
autonomous:
  enabled: true
  database_url: "sqlite:///data/autonomous.db"

  # Monitoring intervals (seconds)
  validation_interval: 300
  performance_snapshot_interval: 86400

  # Drift detection thresholds
  drift_detection:
    min_predictions_required: 30
    mae_threshold: 0.01
    directional_accuracy_threshold: 0.50
    rmse_increase_threshold: 1.5
    window_days: 30

  # Retraining settings
  retraining:
    enabled: true
    cv_improvement_threshold: 0.02
    max_training_time_seconds: 3600
    cooldown_hours: 24
    train_window_days: 365
    backtest_window_days: 90
    window_step_days: 90
    cv_windows: 3

  # Alerting settings
  alerts:
    email_enabled: false
    email_to: ""
    smtp_server: ""
    smtp_port: 587
    smtp_username: ""
    smtp_password: ""

    slack_enabled: false
    slack_webhook_url: ""

    discord_enabled: false
    discord_webhook_url: ""

    telegram_enabled: false
    telegram_bot_token: ""
    telegram_chat_id: ""
